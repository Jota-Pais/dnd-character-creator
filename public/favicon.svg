<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- D20 Background Shape -->
  <polygon points="50,5 95,25 95,75 50,95 5,75 5,25" fill="#facc15" stroke="#b45309" stroke-width="4" stroke-linejoin="round"/>
  
  <!-- Inner lines connecting vertices -->
  <polyline points="5,25 50,45 95,25" fill="none" stroke="#b45309" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="50" y1="45" x2="50" y2="95" stroke="#b45309" stroke-width="3" stroke-linecap="round"/>
  <polyline points="50,5 50,45" fill="none" stroke="#b45309" stroke-width="3" stroke-linecap="round"/>
  <polyline points="5,75 50,45 95,75" fill="none" stroke="#b45309" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Inner triangle for the face "20" -->
  <polygon points="30,30 70,30 50,70" fill="#fef08a" stroke="#b45309" stroke-width="3" stroke-linejoin="round"/>
  
  <!-- Number 20 -->
  <text x="50" y="55" font-family="Georgia, serif" font-weight="bold" font-size="20" fill="#78350f" text-anchor="middle" alignment-baseline="middle">20</text>
</svg>